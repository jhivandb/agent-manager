apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: amp-docker
spec:
  templates:
    - name: build-image
      inputs:
        parameters:
          - name: git-revision
      container:
        image: ghcr.io/openchoreo/podman-runner:v1.0
        command:
          - sh
          - -c
        args:
          - |-
            set -e

            WORKDIR=/mnt/vol/source
            IMAGE="{{ "{{" }}workflow.parameters.image-name{{ "}}" }}:{{ "{{" }}workflow.parameters.image-tag{{ "}}" }}-{{ "{{" }}inputs.parameters.git-revision{{ "}}" }}"
            DOCKER_CONTEXT="{{ "{{" }}workflow.parameters.app-path{{ "}}" }}"
            DOCKERFILE_PATH="{{ "{{" }}workflow.parameters.dockerfile-path{{ "}}" }}"

            #####################################################################
            # 1.  Podman daemon + storage.conf
            #####################################################################
            mkdir -p /etc/containers
            cat > /etc/containers/storage.conf <<EOF
            [storage]
            driver = "overlay"
            runroot = "/run/containers/storage"
            graphroot = "/var/lib/containers/storage"
            [storage.options.overlay]
            mount_program = "/usr/bin/fuse-overlayfs"
            EOF

            #####################################################################
            # 2.  Docker Build
            #####################################################################
            echo ">> Building image: $IMAGE"
            podman build -t $IMAGE -f $WORKDIR$DOCKERFILE_PATH $WORKDIR$DOCKER_CONTEXT

            #####################################################################
            # 3.  Verify non-root user (Security Requirement)
            #####################################################################
            echo ">> Verifying image security requirements..."
            IMAGE_USER=$(podman inspect "$IMAGE" --format '{{ "{{" }}.Config.User{{ "}}" }}')

            # Extract user part (before colon if present, e.g., "0:0" -> "0", "root:docker" -> "root")
            USER_PART="${IMAGE_USER%%:*}"

            if [ -z "$IMAGE_USER" ] || [ "$USER_PART" = "0" ] || [ "$USER_PART" = "root" ]; then
              echo ""
              echo "============================================================"
              echo "ERROR: Image must run as non-root user"
              echo "============================================================"
              echo ""
              echo "Your Dockerfile does not specify a non-root USER."
              echo "Agent images are required to run as non-root for security."
              echo ""
              echo "============================================================"
              exit 1
            fi

            echo ">> Image user verified: $IMAGE_USER (non-root)"

            #####################################################################
            # 4.  Save image
            #####################################################################
            echo ">> Saving image"
            podman save -o /mnt/vol/app-image.tar $IMAGE
            echo ">> Build complete"
        securityContext:
          privileged: true
        volumeMounts:
          - mountPath: /mnt/vol
            name: workspace
