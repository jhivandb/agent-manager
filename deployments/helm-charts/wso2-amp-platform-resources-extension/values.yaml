# Default values for wso2-amp-platform-resources
# This chart creates default OpenChoreo resources needed for the AI Agent Management Platform
# All those resources are created in default namespace

# Kubectl image configuration for jobs
kubectl:
  image: bitnamilegacy/kubectl:1.32.4

# Environment configuration
environment:
  # Name of the default environment
  name: default
  # Display name for the environment
  displayName: "Default"
  # Description for the environment
  description: "Default environment for WSO2 AI Agent Management Platform"
  # Is this environment critical/production?
  isCritical: false
  # DNS Prefix for the gateway
  dnsPrefix: "default"

# Deployment Pipeline configuration
deploymentPipeline:
  # Name of the default deployment pipeline
  name: default
  # Display name for the deployment pipeline
  displayName: "Default Deployment Pipeline"
  # Description for the deployment pipeline
  description: "Default deployment pipeline for WSO2 AI Agent Management Platform"
  # Promotion order for the deployment pipeline
  promotionOrder:
    - sourceEnvironmentRef: default
      targetEnvironmentRefs: []

# Project configuration
project:
  # Name of the default project
  name: default
  # Display name for the project
  displayName: "Default Project"
  # Description for the project
  description: "Default project for WSO2 AI Agent Management Platform"

# External Secrets configuration
externalSecrets:
  # Name of the ClusterSecretStore (created by wso2-amp-secrets-extension chart)
  clusterSecretStoreName: amp-openbao-store

# Authorization configuration for OpenChoreo
authz:
  # AMP API Client authorization binding
  ampApiClient:
    # Client ID used by agent-manager-service (must match Thunder OAuth client_id)
    clientId: amp-api-client
    # Role to assign (super-admin grants full access to OpenChoreo APIs)
    role: super-admin

# Gateway TLS certificate configuration
gatewayTls:
  # Enable gateway TLS certificate creation
  enabled: true
  # Certificate name
  certificateName: gateway-tls
  # Secret name where the certificate will be stored
  secretName: gateway-tls
  # Namespace where the certificate and secret will be created
  namespace: openchoreo-data-plane
  # Certificate duration (default: 2160h = 90 days)
  duration: 2160h
  # Certificate renewal time (default: 720h = 30 days before expiry)
  renewBefore: 720h
  # Common name for the certificate
  commonName: "*.openchoreoapis.localhost"
  # DNS names for the certificate
  dnsNames:
    - "*.openchoreoapis.localhost"
    - "openchoreoapis.localhost"
  # Issuer reference for cert-manager
  issuerRef:
    # Name of the issuer (created by openchoreo-data-plane chart)
    name: openchoreo-data-plane-selfsigned-issuer
    # Issuer kind: Issuer or ClusterIssuer
    kind: Issuer
