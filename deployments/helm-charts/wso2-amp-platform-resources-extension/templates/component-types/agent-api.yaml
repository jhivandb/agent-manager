apiVersion: openchoreo.dev/v1alpha1
kind: ComponentType
metadata:
  name: agent-api
  namespace: default
  annotations:
    openchoreo.dev/display-name: Platform Hosted Agent API
    openchoreo.dev/description: Component type for deploying agent APIs in the AI Agent Management Platform.
spec:
  workloadType: deployment

  allowedWorkflows:
    - amp-google-cloud-buildpacks
    - amp-ballerina-buildpack
    - amp-docker
  allowedTraits:
    - name: python-otel-instrumentation-trait
    - name: instrumentation-trait-env-injection
    - name: horizontal-pod-autoscaler
      instanceName: amp-autoscaler
      parameters:
        enabled: ${parameters.autoscaling.enabled}
        minReplicas: ${parameters.autoscaling.minReplicas}
        maxReplicas: ${parameters.autoscaling.maxReplicas}
        targetCPUUtilizationPercentage: 75
      # Wire environment-specific overrides (only for replica counts)
      envOverrides:
        minReplicas: |
          ${has(envOverrides.autoscaling.minReplicas) ? envOverrides.autoscaling.minReplicas : parameters.autoscaling.minReplicas}
        maxReplicas: |
          ${has(envOverrides.autoscaling.maxReplicas) ? envOverrides.autoscaling.maxReplicas : parameters.autoscaling.maxReplicas}

  schema:
    types:
      ResourceRequirements:
        requests: "ResourceQuantity | default={}"
        limits: "ResourceQuantity | default={}"
      ResourceQuantity:
        cpu: "string | default=100m"
        memory: "string | default=256Mi"
      CORSConfig:
        allowOrigin: "[]string"
        allowMethods: "[]string"
        allowHeaders: "[]string"

    parameters:
      exposed: "boolean | default=false"
      replicas: "integer | default=1 | minimum=1" # This is the default replica count when autoscaling is disabled
      autoscaling:
        enabled: "boolean | default=false"
        minReplicas: "integer | default=2 | minimum=1"
        maxReplicas: "integer | default=5 | minimum=1"
      resources: "ResourceRequirements | default={}"
      cors: 'CORSConfig | default={"allowOrigin": ["http://localhost:3000"], "allowMethods": ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"], "allowHeaders": ["authorization", "Content-Type", "Origin"]}'

    envOverrides:
      replicas: "integer"
      resources: "ResourceRequirements"
      imagePullPolicy: "string | default=IfNotPresent"
      cors: 'CORSConfig'
      restartedAt: "string | default=''"
      autoscaling:
        minReplicas: "integer | minimum=1"
        maxReplicas: "integer | minimum=1"

  resources:
    - id: deployment
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${metadata.name}
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          replicas: |
            ${parameters.autoscaling.enabled ? (has(envOverrides.autoscaling.minReplicas) ? envOverrides.autoscaling.minReplicas : parameters.autoscaling.minReplicas) : (has(envOverrides.replicas) ? envOverrides.replicas : parameters.replicas)}
          selector:
            matchLabels: ${metadata.podSelectors}
          template:
            metadata:
              labels: ${metadata.podSelectors}
              annotations:
                openchoreo.dev/restarted-at: ${envOverrides.restartedAt}
            spec:
              containers:
                - name: main
                  image: ${workload.container.image}
                  imagePullPolicy: ${envOverrides.imagePullPolicy}
                  command: |
                    ${has(workload.container.command) ? workload.container.command : oc_omit()}
                  args: |
                    ${has(workload.container.args) ? workload.container.args : oc_omit()}
                  resources:
                    requests:
                      cpu: |
                        ${has(envOverrides.resources.requests.cpu) ? envOverrides.resources.requests.cpu : parameters.resources.requests.cpu}
                      memory: |
                         ${has(envOverrides.resources.requests.memory) ? envOverrides.resources.requests.memory : parameters.resources.requests.memory}
                    limits:
                      cpu: | 
                        ${has(envOverrides.resources.limits.cpu) ? envOverrides.resources.limits.cpu : parameters.resources.limits.cpu}
                      memory: |
                        ${has(envOverrides.resources.limits.memory) ? envOverrides.resources.limits.memory : parameters.resources.limits.memory}
                  envFrom: ${configurations.toContainerEnvFrom()}
                  volumeMounts: ${configurations.toContainerVolumeMounts()}
              volumes: ${configurations.toVolumes()}

    - id: service
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: ${metadata.componentName}
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          type: ClusterIP
          selector: ${metadata.podSelectors}
          ports: ${workload.toServicePorts()}
    - id: httproute
      includeWhen: ${parameters.exposed == true}
      template:
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: ${metadata.name}
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          parentRefs:
            - name: gateway-default
              namespace: openchoreo-data-plane
          hostnames:
            - ${metadata.environmentName}-${metadata.componentNamespace}.${dataplane.publicVirtualHost}
          rules:
            - matches:
                - path:
                    type: PathPrefix
                    value: /${metadata.componentName}
              filters:
                - type: URLRewrite
                  urlRewrite:
                    path:
                      type: ReplacePrefixMatch
                      replacePrefixMatch: /
                - type: CORS
                  cors:
                    allowOrigins: |
                      ${has(envOverrides.cors.allowOrigin) ? envOverrides.cors.allowOrigin : parameters.cors.allowOrigin}
                    allowMethods: |
                      ${has(envOverrides.cors.allowMethods) ? envOverrides.cors.allowMethods : parameters.cors.allowMethods}
                    allowHeaders: |
                      ${has(envOverrides.cors.allowHeaders) ? envOverrides.cors.allowHeaders : parameters.cors.allowHeaders}
              backendRefs:
                - name: ${metadata.componentName}
                  port: ${workload.toServicePorts()[0].port}
              timeouts:
                request: 30s
    - id: env-config
      forEach: ${configurations.toConfigEnvsByContainer()}
      var: envConfig
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${envConfig.resourceName}
          namespace: ${metadata.namespace}
        data: |
          ${envConfig.envs.transformMapEntry(index, env, {env.name: env.value})}
    - id: secret-env-external
      forEach: ${configurations.toSecretEnvsByContainer()}
      var: secretEnv
      template:
        apiVersion: external-secrets.io/v1
        kind: ExternalSecret
        metadata:
          name: ${secretEnv.resourceName}
          namespace: ${metadata.namespace}
        spec:
          refreshInterval: 15s
          secretStoreRef:
            name: ${dataplane.secretStore}
            kind: ClusterSecretStore
          target:
            name: ${secretEnv.resourceName}
            creationPolicy: Owner
          data: |
            ${secretEnv.envs.map(secret, {
              "secretKey": secret.name,
              "remoteRef": {
                "key": secret.remoteRef.key,
                "property": has(secret.remoteRef.property) ? secret.remoteRef.property : oc_omit()
              }
            })}
