apiVersion: openchoreo.dev/v1alpha1
kind: ComponentType
metadata:
  name: agent-api
  namespace: default
  annotations:
    openchoreo.dev/display-name: Platform Hosted Agent API
    openchoreo.dev/description: Component type for deploying agent APIs in the AI Agent Management Platform.
spec:
  workloadType: deployment

  allowedWorkflows:
    - amp-google-cloud-buildpacks
    - amp-ballerina-buildpack
    - amp-docker
  allowedTraits:
    - name: python-otel-instrumentation-trait
    - name: instrumentation-trait-env-injection
    - name: api-configuration

  traits:
    - name: horizontal-pod-autoscaler
      instanceName: ${meta.componentName}-hpa
      envOverrides:
        enabled: ${envOverrides.autoscaling.enabled}
        minReplicas: ${envOverrides.autoscaling.minReplicas}
        maxReplicas: ${envOverrides.autoscaling.maxReplicas}
        targetCPUUtilizationPercentage: ${envOverrides.autoscaling.cpuUtilizationPercentage}
  schema:
    types:
      ResourceRequirements:
        requests: "ResourceQuantity | default={}"
        limits: "ResourceQuantity | default={}"
      ResourceQuantity:
        cpu: "string | default=100m"
        memory: "string | default=256Mi"
      CORSConfig:
        allowOrigin: "[]string"
        allowMethods: "[]string"
        allowHeaders: "[]string"
      AutoscalingEnvOverrides:
        enabled: "boolean | default=false"
        cpuUtilizationPercentage: "integer | default=80 | minimum=1 | maximum=100"
        minReplicas: "integer | default=2 | minimum=1"
        maxReplicas: "integer | default=5 | minimum=1"

    parameters:
      exposed: "boolean | default=false"
    
    envOverrides:
      replicas: "integer | default=1 | minimum=1" # This is the static replica count when hpa is disabled
      resources: 'ResourceRequirements | default={}'
      imagePullPolicy: "string | default=IfNotPresent"
      cors: 'CORSConfig | default={"allowOrigin": ["http://localhost:3000"], "allowMethods": ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"], "allowHeaders": ["authorization", "Content-Type", "Origin"]}'
      restartedAt: "string | default=''"
      autoscaling: "AutoscalingEnvOverrides | default={}"

  resources:
    - id: deployment
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${metadata.name}
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          replicas: ${envOverrides.replicas}
          selector:
            matchLabels: ${metadata.podSelectors}
          template:
            metadata:
              labels: ${metadata.podSelectors}
              annotations:
                openchoreo.dev/restarted-at: ${envOverrides.restartedAt}
            spec:
              containers:
                - name: main
                  image: ${workload.container.image}
                  imagePullPolicy: ${envOverrides.imagePullPolicy}
                  command: |
                    ${has(workload.container.command) ? workload.container.command : oc_omit()}
                  args: |
                    ${has(workload.container.args) ? workload.container.args : oc_omit()}
                  resources:
                    requests:
                      cpu: ${envOverrides.resources.requests.cpu}
                      memory: ${envOverrides.resources.requests.memory}
                    limits:
                      cpu: ${envOverrides.resources.limits.cpu}
                      memory: ${envOverrides.resources.limits.memory}
                  envFrom: ${configurations.toContainerEnvFrom()}
                  volumeMounts: ${configurations.toContainerVolumeMounts()}
              volumes: ${configurations.toVolumes()}

    - id: service
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: ${metadata.componentName}
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          type: ClusterIP
          selector: ${metadata.podSelectors}
          ports: ${workload.toServicePorts()}
    - id: httproute
      includeWhen: ${parameters.exposed == true}
      template:
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: ${metadata.name}
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          parentRefs:
            - name: gateway-default
              namespace: openchoreo-data-plane
          hostnames:
            - ${metadata.environmentName}-${metadata.componentNamespace}.${dataplane.publicVirtualHost}
          rules:
            - matches:
                - path:
                    type: PathPrefix
                    value: /${metadata.componentName}
              filters:
                - type: URLRewrite
                  urlRewrite:
                    path:
                      type: ReplacePrefixMatch
                      replacePrefixMatch: /
                - type: CORS
                  cors:
                    allowOrigins: ${envOverrides.cors.allowOrigin}
                    allowMethods: ${envOverrides.cors.allowMethods}
                    allowHeaders: ${envOverrides.cors.allowHeaders}
              backendRefs:
                - name: ${metadata.componentName}
                  port: ${workload.toServicePorts()[0].port}
              timeouts:
                request: 30s
    - id: env-config
      forEach: ${configurations.toConfigEnvsByContainer()}
      var: envConfig
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${envConfig.resourceName}
          namespace: ${metadata.namespace}
        data: |
          ${envConfig.envs.transformMapEntry(index, env, {env.name: env.value})}
    - id: secret-env-external
      forEach: ${configurations.toSecretEnvsByContainer()}
      var: secretEnv
      template:
        apiVersion: external-secrets.io/v1
        kind: ExternalSecret
        metadata:
          name: ${secretEnv.resourceName}
          namespace: ${metadata.namespace}
        spec:
          refreshInterval: 15s
          secretStoreRef:
            name: ${dataplane.secretStore}
            kind: ClusterSecretStore
          target:
            name: ${secretEnv.resourceName}
            creationPolicy: Owner
          data: |
            ${secretEnv.envs.map(secret, {
              "secretKey": secret.name,
              "remoteRef": {
                "key": secret.remoteRef.key,
                "property": has(secret.remoteRef.property) ? secret.remoteRef.property : oc_omit()
              }
            })}
