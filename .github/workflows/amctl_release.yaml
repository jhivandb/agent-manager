name: amctl CLI Release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to release from"
        required: true
        default: "main"
        type: string
      target_version:
        description: "Target version for the release (e.g., 0.1.0)"
        required: true
        type: string

run-name: amctl Release ${{ inputs.target_version }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Setup Go
        uses: actions/setup-go@v6.1.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run tests
        run: go test ./internal/amctl/... ./cmd/amctl/... -v

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6.1.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set release tag
        run: |
          echo "RELEASE_TAG=amctl/v${{ inputs.target_version }}" >> "$GITHUB_ENV"
          echo "VERSION=${{ inputs.target_version }}" >> "$GITHUB_ENV"

      - name: Check tag does not already exist
        run: |
          if git ls-remote --tags origin "$RELEASE_TAG" | grep -q "$RELEASE_TAG"; then
            echo "Error: Tag $RELEASE_TAG already exists. Please use a different version."
            exit 1
          fi

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" -m "Release amctl v${VERSION}"
          git push origin "$RELEASE_TAG"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: v${{ inputs.target_version }}
