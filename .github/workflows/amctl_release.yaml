name: amctl CLI Release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to release from"
        required: true
        default: "main"
        type: string
      target_version:
        description: "Target version for the release (e.g., 0.1.0)"
        required: true
        type: string

run-name: amctl Release ${{ inputs.target_version }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Setup Go
        uses: actions/setup-go@v6.1.0
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Run tests
        run: cd cli && go test ./... -v

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6.1.0
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Validate and set release tag
        env:
          TARGET_VERSION: ${{ inputs.target_version }}
        run: |
          if ! [[ "$TARGET_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Error: target_version must be semver (e.g., 1.2.3 or 1.2.3-rc.1)"
            exit 1
          fi
          printf 'VERSION=%s\n' "$TARGET_VERSION" >> "$GITHUB_ENV"
          printf 'RELEASE_TAG=amctl/v%s\n' "$TARGET_VERSION" >> "$GITHUB_ENV"

      - name: Check tags do not already exist
        run: |
          for tag in "$RELEASE_TAG" "v${VERSION}"; do
            if git ls-remote --tags origin "$tag" | grep -q "$tag"; then
              echo "Error: Tag $tag already exists. Please use a different version."
              exit 1
            fi
          done

      - name: Create and push tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" -m "Release amctl v${VERSION}"
          git tag -a "v${VERSION}" -m "Release amctl v${VERSION}"
          git push origin "$RELEASE_TAG" "v${VERSION}"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
